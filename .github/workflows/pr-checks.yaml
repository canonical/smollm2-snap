name: PR Checks
on: [pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  cla:
    runs-on: ubuntu-slim
    steps:
      - name: Check if CLA signed
        uses: canonical/has-signed-canonical-cla@v2

  lint:
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Prevent usage of simulated merge commit of PR
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Lint package
        uses: canonical/inference-snaps-cli/.github/actions/lint-package@lint-package-action  # v2.0.0-beta.10
        with:
          package-dir: .
