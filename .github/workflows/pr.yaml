name: PR

on:
  pull_request:
    types: 
      - labeled
      # Commit events
      - opened
      - synchronize
      - reopened
      
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-cla:
    # Run on commit events
    if: ${{ github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened' }}
    permissions:
      pull-requests: read
    runs-on: ubuntu-slim
    steps:
      - name: Check if CLA signed
        uses: canonical/has-signed-canonical-cla@v2

  lint:
    # Run on commit events
    if: ${{ github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened' }}
    permissions:
      contents: read
    runs-on: [ ubuntu-latest ]
    steps:

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Prevent usage of simulated merge commit of PR
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Checkout linter
        uses: actions/checkout@v7
        with:
          repository: canonical/inference-snaps-cli
          path: inference-snaps-cli
          ref: v2.0.0-beta.5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Validate engines
        run: |
          cd inference-snaps-cli/cmd/modelctl
          go run . debug validate-engines ../../../engines/**/*.yaml

  build-test:
    if: ${{ github.event.action == 'labeled' }}
    # The applied label is used to select build/test tasks and as job's display name.
    name: ${{ github.event.label.name }}
    permissions:
      contents: read
      pull-requests: write
      actions: read
    uses: canonical/inference-snaps-dev/.github/workflows/reuse-pr-build-test.yaml@reuse-pr-workflow # TODO: v2
    with:
      trigger-label: ${{ github.event.label.name }}
      pr-number: "${{ github.event.pull_request.number }}"
      # build-runners: |
      #   [
      #     ["amd64", "resolute", "self-hosted"],
      #     ["arm64", "resolute", "self-hosted"]
      #   ]
      test-jobs-matrix: |
        [
          {
            "job-queue": "maas-systemtests-amd64",
            "provision-data": "distro: noble",
            "select-engine": "cpu",
            "test-chat-tps": true
          },
          {
            "job-queue": "anbox-nvidia-amd64",
            "provision-data": "distro: noble",
            "install-nvidia-driver-version": 595,
            "select-engine": "nvidia-gpu",
            "test-chat-tps": true,
            "expected-tps": 9.4
          }
        ]
      snap-name: smollm2
    secrets:
      store-credentials: ${{ secrets.STORE_LOGIN_PR }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
