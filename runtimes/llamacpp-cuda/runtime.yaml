name: llamacpp-cuda

servers:
  openai:
    protocol: http
    base-path: /v1

environment:
  # Add llama.cpp binaries
  - PATH=$PATH:$SNAP_COMPONENTS/llamacpp-cuda/bin
  # Add llama.cpp-built shared libraries
  - LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$SNAP_COMPONENTS/llamacpp-cuda/lib
  # Add staged shared libraries
  - LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$SNAP_COMPONENTS/llamacpp-cuda/usr/lib/$ARCH_TRIPLET

components:
  - llamacpp-cuda
